<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luminary">
<meta name="theme-color" content="#080a0e">
<title>Luminary — Story Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Josefin+Sans:wght@200;300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080a0e;
  --bg2: #0e1118;
  --bg3: #141820;
  --surface: #1a2030;
  --border: rgba(180,160,120,0.12);
  --border2: rgba(180,160,120,0.22);
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --text: #e8e0d0;
  --text2: #a09880;
  --text3: #5a5245;
  --active: rgba(201,168,76,0.08);
  --font-title: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', serif;
  --font-ui: 'Josefin Sans', sans-serif;
  --spd: 0.3s;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
/* Warm Sepia theme */
.theme-sepia {
  --bg: #1a1408; --bg2: #211a0d; --bg3: #2a2010;
  --surface: #33280f; --border: rgba(200,170,100,0.15); --border2: rgba(200,170,100,0.28);
  --gold: #d4a84c; --gold2: #f0c96a; --gold-dim: rgba(212,168,76,0.15);
  --text: #f5ead0; --text2: #b8a070; --text3: #6a5a35; --active: rgba(212,168,76,0.1);
}
/* E-Ink theme */
.theme-eink {
  --bg: #f8f6f0; --bg2: #ede9e0; --bg3: #e0dbd0;
  --surface: #d0cac0; --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
  --gold: #1a1a1a; --gold2: #000; --gold-dim: rgba(0,0,0,0.06);
  --text: #111; --text2: #555; --text3: #999; --active: rgba(0,0,0,0.05);
}

html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; transition: background 0.4s, color 0.4s; }

#app { display: flex; height: 100dvh; position: relative; overflow: hidden; }

/* Sidebar overlay */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 19;
  opacity: 0; transition: opacity var(--spd);
}
#sidebar-overlay.show { opacity: 1; }

/* Sidebar */
#sidebar {
  width: 280px; min-width: 280px;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform var(--spd) cubic-bezier(.4,0,.2,1);
  z-index: 20; flex-shrink: 0;
}

@media (max-width: 640px) {
  #sidebar-overlay { display: block; pointer-events: none; }
  #sidebar-overlay.show { pointer-events: all; }
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: 4px 0 32px rgba(0,0,0,0.6); padding-top: var(--safe-top); }
  #sidebar.open { transform: translateX(0); }
}
@media (min-width: 641px) {
  #sidebar { transform: translateX(0) !important; }
  #sidebar.collapsed { transform: translateX(-280px) !important; margin-right: -280px; }
}

.sidebar-header { padding: 28px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: var(--font-title); font-size: 18px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; }
.logo-sub { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.3em; color: var(--text3); text-transform: uppercase; margin-top: 3px; }

/* Chapter index drawer */
#chapter-drawer {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
  flex-shrink: 0;
}
#chapter-drawer.open { max-height: 220px; }
#chapter-list { overflow-y: auto; max-height: 220px; padding: 6px 0; }
#chapter-list::-webkit-scrollbar { width: 3px; }
#chapter-list::-webkit-scrollbar-thumb { background: var(--border2); }
.ch-item {
  padding: 8px 24px; cursor: pointer; font-family: var(--font-ui);
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text2); border-left: 2px solid transparent;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.ch-item:hover, .ch-item:active { background: var(--active); color: var(--gold); }
.ch-item.active { color: var(--gold); border-left-color: var(--gold); }
.ch-toggle {
  width: 100%; padding: 8px 24px; background: none; border: none;
  border-bottom: 1px solid var(--border); cursor: pointer;
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text3); text-align: left;
  display: flex; align-items: center; justify-content: space-between;
  transition: color 0.2s; -webkit-tap-highlight-color: transparent;
}
.ch-toggle:hover { color: var(--gold2); }
.ch-toggle-arrow { transition: transform 0.3s; }
.ch-toggle.open .ch-toggle-arrow { transform: rotate(180deg); }

#stories-list { flex: 1; overflow-y: auto; padding: 12px 0; }
#stories-list::-webkit-scrollbar { width: 3px; }
#stories-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.story-item {
  padding: 12px 24px; cursor: pointer; border-left: 2px solid transparent;
  transition: all 0.2s; position: relative; -webkit-tap-highlight-color: transparent;
}
.story-item:hover, .story-item:active { background: var(--active); }
.story-item.active { background: var(--gold-dim); border-left-color: var(--gold); }
.story-item .s-title { font-family: var(--font-body); font-size: 15px; color: var(--text); line-height: 1.3; padding-right: 28px; }
.story-item.active .s-title { color: var(--gold2); }
.story-item .s-meta { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-top: 3px; }
.story-item .s-progress { height: 2px; background: var(--border); margin-top: 6px; border-radius: 1px; overflow: hidden; }
.story-item .s-prog-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.3s; }
.story-item .s-del {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 18px; padding: 6px; line-height: 1; border-radius: 50%;
  transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent;
}
.story-item .s-del:hover, .story-item .s-del:active { color: #c05555; background: rgba(192,85,85,0.1); }

.add-btn {
  margin: 12px 16px calc(12px + var(--safe-bot)); padding: 11px 0;
  background: none; border: 1px solid var(--border2); color: var(--gold);
  font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; cursor: pointer; border-radius: 2px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.add-btn:hover, .add-btn:active { background: var(--gold-dim); border-color: var(--gold); }
.add-btn::before { content: '+'; font-size: 16px; font-weight: 300; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Top bar */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; padding-top: calc(10px + var(--safe-top));
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 5; flex-shrink: 0;
}
#toggle-sidebar {
  background: none; border: none; cursor: pointer; color: var(--text2);
  padding: 6px; display: flex; border-radius: 4px;
  transition: color 0.2s, background 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#toggle-sidebar:hover, #toggle-sidebar:active { color: var(--gold); background: var(--active); }
#toggle-sidebar svg { width: 18px; height: 18px; }

#book-title {
  font-family: var(--font-title); font-size: 12px; letter-spacing: 0.12em;
  color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
}

/* WPM display */
#wpm-display {
  display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0;
}
#wpm-val { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.1em; color: var(--gold); line-height: 1; }
#time-remaining { font-family: var(--font-ui); font-size: 8px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-top: 2px; white-space: nowrap; }

/* Font toggle */
#font-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; padding: 5px 8px;
  border-radius: 2px; transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#font-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Theme button */
#theme-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; padding: 5px 8px;
  border-radius: 2px; transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#theme-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Pace slider */
.pace-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.pace-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
.pace-val { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em; color: var(--gold); min-width: 44px; text-align: right; }

#speed-range {
  -webkit-appearance: none; appearance: none; width: 80px; height: 3px;
  background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct, 40%), var(--border2) var(--pct, 40%), var(--border2) 100%);
  border-radius: 2px; outline: none; cursor: pointer; flex-shrink: 0;
}
#speed-range::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.5);
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
#speed-range::-webkit-slider-thumb:hover, #speed-range:active::-webkit-slider-thumb { transform: scale(1.3); box-shadow: 0 0 12px rgba(201,168,76,0.7); }
#speed-range::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--gold); border: none; box-shadow: 0 0 6px rgba(201,168,76,0.5); cursor: pointer; }
#speed-range::-moz-range-track { background: var(--border2); height: 3px; border-radius: 2px; }
#speed-range::-moz-range-progress { background: var(--gold); height: 3px; border-radius: 2px; }

.ctrl-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ctrl-btn {
  background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  padding: 6px 10px; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:hover, .ctrl-btn:active { border-color: var(--gold); color: var(--gold); }
.ctrl-btn.active-btn { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

@media (max-width: 540px) {
  #topbar { flex-wrap: wrap; padding: 8px 12px; padding-top: calc(8px + var(--safe-top)); gap: 6px; }
  #book-title { font-size: 10px; width: calc(100% - 40px); flex-basis: calc(100% - 40px); order: 1; }
  #toggle-sidebar { order: 0; }
  .pace-wrap { order: 3; flex: 1; }
  #speed-range { width: 100%; flex: 1; }
  .ctrl-group { order: 2; margin-left: auto; }
  #wpm-display { order: 4; }
  #font-btn, #theme-btn { display: none; }
  #mobile-settings-btn { display: flex !important; }
}
@media (min-width: 541px) {
  #mobile-settings-btn { display: none !important; }
}

#mobile-settings-btn {
  display: none; background: none; border: 1px solid var(--border); color: var(--text2);
  padding: 6px 8px; border-radius: 2px; cursor: pointer; font-size: 14px;
  transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; align-items: center;
}
#mobile-settings-btn:active { border-color: var(--gold); color: var(--gold); }

/* Settings drawer (mobile) */
#settings-drawer {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease; flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 8px; padding: 0;
}
#settings-drawer.open { max-height: 80px; padding: 10px 14px; }

/* Stage */
#stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); overflow: hidden; position: relative;
}
#stage::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 70%);
  pointer-events: none;
}

/* Caption */
#caption-wrap {
  width: 100%; max-width: 820px; padding: 0 32px;
  display: flex; flex-direction: column; align-items: center;
}
@media (max-width: 480px) { #caption-wrap { padding: 0 20px; } }

/* Progress bar — clickable */
#progress-bar {
  width: 100%; height: 3px; background: var(--border);
  margin-bottom: 28px; position: relative; border-radius: 2px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
#progress-bar:hover { height: 5px; margin-bottom: 26px; }
#progress-fill {
  position: absolute; left: 0; top: 0;
  height: 100%; background: var(--gold); border-radius: 2px;
  transition: width 0.35s ease; box-shadow: 0 0 8px rgba(201,168,76,0.4);
}
#progress-scrub-handle {
  position: absolute; top: 50%; width: 12px; height: 12px;
  background: var(--gold); border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.15s; pointer-events: none;
  box-shadow: 0 0 10px rgba(201,168,76,0.6);
}
#progress-bar:hover #progress-scrub-handle, #progress-bar:active #progress-scrub-handle { transform: translate(-50%, -50%) scale(1); }

#chapter-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text3); margin-bottom: 24px; }

/* ORP word mode wrapper */
#orp-wrap {
  display: none; align-items: center; justify-content: center;
  min-height: 100px; position: relative;
}
#orp-before { font-family: var(--font-body); font-size: 28px; color: var(--text); opacity: 0.9; font-weight: 300; text-align: right; width: 50%; padding-right: 2px; }
#orp-letter { font-family: var(--font-body); font-size: 28px; color: var(--gold2); font-weight: 400; text-shadow: 0 0 20px rgba(232,201,122,0.4); width: 20px; text-align: center; }
#orp-after { font-family: var(--font-body); font-size: 28px; color: var(--text); opacity: 0.9; font-weight: 300; text-align: left; width: 50%; padding-left: 2px; }
#orp-guide {
  position: absolute; bottom: -12px; width: 1px; height: 6px;
  background: var(--gold); opacity: 0.5; left: 50%;
}

#caption-box {
  text-align: center; min-height: 140px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.caption-line {
  font-family: var(--font-body); line-height: 1.55; font-weight: 300;
  letter-spacing: 0.01em; max-width: 680px;
  transition: opacity 0.25s, transform 0.3s;
}
.caption-line.prev { opacity: 0.14; font-size: 17px; margin-bottom: 10px; transform: translateY(-4px); font-style: italic; color: var(--text2); }
.caption-line.current { opacity: 1; font-size: 28px; }
.caption-line.next { opacity: 0.16; font-size: 17px; margin-top: 10px; transform: translateY(4px); font-style: italic; color: var(--text2); }

/* UI Font options overrides */
body.font-sans .caption-line, body.font-sans #orp-before, body.font-sans #orp-letter, body.font-sans #orp-after {
  font-family: 'DM Sans', sans-serif;
}
body.font-dyslexic .caption-line, body.font-dyslexic #orp-before, body.font-dyslexic #orp-letter, body.font-dyslexic #orp-after {
  font-family: 'Arial', sans-serif; letter-spacing: 0.05em; word-spacing: 0.1em;
}

@media (max-width: 480px) {
  .caption-line.current { font-size: 22px; }
  .caption-line.prev, .caption-line.next { font-size: 14px; }
  #caption-box { min-height: 120px; }
  #orp-before, #orp-letter, #orp-after { font-size: 22px; }
}

#counter { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em; color: var(--text3); margin-top: 24px; }

/* Nav controls */
#nav-controls { display: flex; align-items: center; gap: 20px; margin-top: 32px; padding-bottom: var(--safe-bot); }
.nav-btn {
  background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover, .nav-btn:active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.nav-btn svg { width: 16px; height: 16px; }

#play-btn {
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px solid var(--gold); background: var(--gold-dim);
  color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
#play-btn:hover, #play-btn:active { background: rgba(201,168,76,0.25); }
#play-btn svg { width: 22px; height: 22px; }

/* Empty state */
#empty-state { text-align: center; padding: 20px; }
#empty-state .e-icon { font-size: 40px; margin-bottom: 20px; opacity: 0.2; }
#empty-state .e-title { font-family: var(--font-title); font-size: 20px; color: var(--text2); letter-spacing: 0.12em; margin-bottom: 10px; }
#empty-state .e-sub { font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text3); }

/* Modals layout structures */
#modal-overlay, #settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s; backdrop-filter: blur(4px);
}
#modal-overlay.open, #settings-overlay.open { opacity: 1; pointer-events: all; }
@media (min-width: 600px) { 
  #modal-overlay, #settings-overlay { align-items: center; } 
  #modal, #settings-modal { border-radius: 4px !important; max-height: 90vh; } 
}

#modal, #settings-modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px 12px 0 0; width: 100%; max-width: 580px;
  max-height: 92dvh; overflow-y: auto; padding: 28px 24px;
  padding-bottom: calc(28px + var(--safe-bot));
  transform: translateY(24px); transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}
#settings-modal { max-width: 480px; }
#modal-overlay.open #modal, #settings-overlay.open #settings-modal { transform: translateY(0); }

.modal-title { font-family: var(--font-title); font-size: 15px; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 24px; text-transform: uppercase; }
.field { margin-bottom: 18px; }
.field label { display: block; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }
.field input, .field textarea, .field select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--font-body); font-size: 15px;
  padding: 10px 14px; border-radius: 2px; outline: none; resize: vertical;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.field select { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.05em; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); }
.field textarea { min-height: 160px; line-height: 1.6; }

/* File drop zone */
#drop-zone {
  border: 1px dashed var(--border2); border-radius: 2px;
  padding: 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; margin-bottom: 18px;
  -webkit-tap-highlight-color: transparent;
}
#drop-zone:hover, #drop-zone.drag-over { border-color: var(--gold); background: var(--gold-dim); }
#drop-zone p { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); }
#drop-zone p span { color: var(--gold); }
#file-input { display: none; }

.modal-row { display: flex; gap: 10px; }
.modal-row .field { flex: 1; }

.modal-actions { display: flex; gap: 10px; justify-content: space-between; margin-top: 24px; align-items: center; }
.btn-paste {
  background: none; border: 1px solid var(--border2); color: var(--text3); cursor: pointer;
  padding: 8px 14px; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-paste:hover { border-color: var(--text2); color: var(--text2); }
.modal-btns { display: flex; gap: 10px; }
.btn-cancel {
  background: none; border: 1px solid var(--border2); color: var(--text2); cursor: pointer;
  padding: 9px 18px; font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-cancel:hover { border-color: var(--text2); }
.btn-save {
  background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); cursor: pointer;
  padding: 9px 22px; font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-save:hover, .btn-save:active { background: rgba(201,168,76,0.25); }

/* TTS and Settings Layouts */
#tts-btn {
  background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.2s; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
#tts-btn:hover, #tts-btn:active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
#tts-btn.tts-active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); animation: tts-pulse 1.2s ease-in-out infinite; }
#tts-btn svg { width: 16px; height: 16px; }
@keyframes tts-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)} 50%{box-shadow:0 0 0 6px rgba(201,168,76,0)} }

#settings-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  cursor: pointer; padding: 6px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#settings-btn:hover { border-color: var(--gold); color: var(--gold); }
#settings-btn svg { width: 18px; height: 18px; }

.settings-section-label {
  font-family: var(--font-ui); font-size: 8px; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 14px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.settings-status { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.05em; color: var(--text3); margin-top: 4px; }
.settings-status.ok { color: #55c077; }
.settings-status.err { color: #c05555; }

/* Custom Scrollbars definitions */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Luminary</div>
      <div class="logo-sub">Story Reader</div>
    </div>
    
    <div id="chapter-drawer">
      <button class="ch-toggle" onclick="toggleChapterDrawer()">
        <span>Chapters</span>
        <svg class="ch-toggle-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div id="chapter-list"></div>
    </div>
    
    <div id="stories-list"></div>
    <button class="add-btn" onclick="openModal()">Add Story</button>
  </div>
  
  <div id="main">
    <div id="topbar">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <span id="book-title">—</span>
      
      <div class="ctrl-group">
        <button class="ctrl-btn" id="mode-btn" onclick="toggleMode()">Sentence</button>
        <button class="ctrl-btn" onclick="restartReader()">↺</button>
      </div>
      
      <div class="pace-wrap">
        <span class="pace-label">Pace</span>
        <input type="range" id="speed-range" min="1" max="100" value="40" title="Reading speed" oninput="onPaceChange(this)">
        <span class="pace-val" id="pace-val">—</span>
      </div>
      
      <div id="wpm-display">
        <span id="wpm-val">— wpm</span>
        <span id="time-remaining">—</span>
      </div>
      
      <button id="font-btn" onclick="cycleFont()" title="Change font">Aa</button>
      <button id="theme-btn" onclick="cycleTheme()" title="Change theme">◑</button>
      <button id="settings-btn" onclick="openSettings()" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="mobile-settings-btn" onclick="openSettings()" title="Settings Mobile">⚙</button>
    </div>
    
    <div id="stage">
      <div id="empty-state">
        <div class="e-icon">✦</div>
        <div class="e-title">No Story Loaded</div>
        <div class="e-sub">Select an archive item from the shelf or add a custom document.</div>
      </div>
      
      <div id="caption-wrap" style="display:none;">
        <div id="progress-bar" onclick="onScrubProgress(event)">
          <div id="progress-fill"></div>
          <div id="progress-scrub-handle"></div>
        </div>
        
        <div id="chapter-label">—</div>
        
        <div id="orp-wrap">
          <div id="orp-before"></div>
          <div id="orp-letter"></div>
          <div id="orp-after"></div>
          <div id="orp-guide"></div>
        </div>
        
        <div id="caption-box">
          <div class="caption-line prev" id="line-prev"></div>
          <div class="caption-line current" id="line-current"></div>
          <div class="caption-line next" id="line-next"></div>
        </div>
        
        <div id="counter">—</div>
        
        <div id="nav-controls">
          <button class="nav-btn" onclick="stepBack()" title="Previous (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button id="play-btn" onclick="togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
          </button>
          <button class="nav-btn" onclick="stepForward()" title="Next (→)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button id="tts-btn" onclick="toggleTTS()" title="Read aloud (Google Cloud TTS)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M11 5L6 9H2v6h4l5 4V5z"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title">Incorporate Document</div>
    
    <div id="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)" onclick="document.getElementById('file-input').click()">
      <p>Drag & Drop Text/HTML document here or <span>Browse files</span></p>
      <input type="file" id="file-input" accept=".txt,.html,.htm" onchange="onFileSelect(event)">
    </div>
    
    <div class="modal-row">
      <div class="field">
        <label>Title</label>
        <input type="text" id="inp-title" placeholder="e.g., Walden">
      </div>
      <div class="field">
        <label>Author</label>
        <input type="text" id="inp-author" placeholder="e.g., H. D. Thoreau">
      </div>
    </div>
    <div class="field">
      <label>Content Text</label>
      <textarea id="inp-text" placeholder="Paste structural transcription copy here..."></textarea>
    </div>
    
    <div class="modal-actions">
      <button class="btn-paste" onclick="pasteFromClipboard()">Paste Clipboard</button>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveNewStory()">Save to Shelf</button>
      </div>
    </div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-modal">
    <div class="modal-title">Preferences Configuration</div>
    
    <div class="settings-section-label">Google Cloud Audio Synthesis Engine</div>
    <div class="field">
      <label>Google Cloud API Key</label>
      <input type="password" id="settings-key-input" placeholder="AIzaSy...">
      <div id="settings-status" class="settings-status">No Cloud Credentials Configured</div>
    </div>
    
    <div class="field">
      <label>Voice Profile</label>
      <select id="tts-voice-select">
        <option value="en-US-Journey-F">Journey Female (Premium)</option>
        <option value="en-US-Journey-M">Journey Male (Premium)</option>
        <option value="en-US-Neural2-F">Neural2 English Female</option>
        <option value="en-US-Neural2-H">Neural2 English Male</option>
        <option value="en-US-Wavenet-C">Wavenet Female</option>
        <option value="en-US-Wavenet-D">Wavenet Male</option>
      </select>
    </div>
    
    <div class="modal-actions" style="justify-content: flex-end;">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeSettings()">Close</button>
        <button class="btn-save" onclick="saveSettings()">Save Configuration</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Core Default Stories Database ────────────────────────────────────────
const DEFAULT_STORIES = [
  {
    id: 's1',
    title: 'The Lighthouse',
    author: 'Elena Vance',
    text: `Elena walked to the lighthouse because she was tired of searching. It rose from the cliffs like a pale finger pointing at a sky it no longer believed in. The lantern room was dark, of course — it had been dark for thirty years, ever since the ships stopped coming. Elena climbed the iron stairs slowly, one hand trailing the curved wall, feeling the cold seep through stone that had swallowed decades of sea wind. She counted the steps without meaning to. Forty-two. The same as always.\n\nChapter 2: The dormant glass\n\nAt the top, the great lens sat dormant and dusty, its prisms catching the grey afternoon light and breaking it into colors that had no business being this sad. She pressed her palm to the glass. It was warmer than the air outside. Strange. She had come looking for her grandfather's logbooks. What she found instead was a candle, half-burned, sitting in a brass holder on the keeper's table. It was recent. She could tell by the soft waxy smell, by the way the wick had not yet blackened with age. Someone still came here. Someone still kept the light — even a small one, even a secret one — burning in the dark.`
  },
  {
    id: 's2',
    title: 'The Letter',
    author: 'P. Vasquez',
    text: `The letter arrived on a Tuesday, which was unusual. Not because Tuesday was a strange day for letters — but because the address was written in her own handwriting, and she had never sent anything to herself. She stood at the door in her bathrobe, holding the envelope up to the morning light as if she could see through it. The stamps were unfamiliar. The postmark was smeared beyond reading. Inside was a single sheet of paper. At the top, the date was written out perfectly. She felt certain, with a conviction she could not explain, that she had drawn it herself.`
  },
  {
    id: 's3',
    title: 'The Cartographer',
    author: 'I. Osei',
    text: `He spent forty years making maps of places he had never been. Not imaginary places — real ones. Countries, coastlines, mountain ranges surveyed by others and handed to him in notes and measurements and rough sketches that he translated into the clean lines of geography. He knew the shape of every continent by touch, could trace the curve of rivers in the dark. But he had never left the city where he was born. When he finally retired, his daughter bought him a plane ticket to Iceland — to a fjord he had mapped in 1987 from a colleague's photographs. He stood at the water's edge in the thin arctic light and looked at the mountains he had drawn so carefully, and felt something he could not name. The proportions were almost right. The feeling was entirely wrong. No map, he understood, could ever hold the way cold air catches in the lungs like something living. No contour line captures the particular silence of water that has never heard a human voice. He had spent forty years making accurate documents of other people's astonishment. He had only a few left to gather his own.`
  }
];

// ── Application Core State Management ────────────────────────────────────
let stories = JSON.parse(localStorage.getItem('luminary_stories')) || JSON.parse(JSON.stringify(DEFAULT_STORIES));
let currentStoryId = null;
let sentences = [];
let cursor = 0;
let playing = false;
let playTimer = null;
let wordTimer = null;
let sidebarOpen = window.innerWidth > 640;
let wordMode = false;
let words = [];
let wordIdx = 0;
let chapters = [];
let currentChapterIdx = 0;
let isDrawerOpen = false;

let themeIdx = parseInt(localStorage.getItem('luminary_theme')) || 0;
let fontIdx = parseInt(localStorage.getItem('luminary_font')) || 0;

const THEMES = ['midnight', 'sepia', 'eink'];
const THEME_LABELS = ['Midnight', 'Sepia', 'E-Ink'];
const FONTS = ['serif', 'sans', 'dyslexic'];
const FONT_LABELS = ['Garamond', 'DM Sans', 'Dyslexic UI'];

// ── Application Lifecycle Initialization ─────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  applyFont();
  renderSidebar();
  
  // Try restoring last active document position context
  const lastId = localStorage.getItem('luminary_active_id');
  if (lastId && stories.some(s => s.id === lastId)) {
    loadStory(lastId);
  }
  
  // Set up progress bar logic for mouse tracking scrub bounds
  window.addEventListener('resize', () => {
    if (window.innerWidth <= 640 && sidebarOpen) {
      toggleSidebar();
    }
  });
});

// ── Sentence & Paragraph Processing Parsers ──────────────────────────────
function parseSentences(text) {
  return text.match(/[^.!?…\n]+[.!?…\n]+["']?/g)?.map(s => s.trim()).filter(Boolean) || text.split('\n').filter(Boolean);
}

function parseChapters(text) {
  const chapterRx = /^(chapter\s+[\w\d]+[\s:—–-]*.*?)$/im;
  const blocks = text.split(/\n{2,}/);
  const chs = [];
  let sentIdx = 0;
  
  for (const block of blocks) {
    const trimmed = block.trim();
    if (!trimmed) continue;
    const sents = parseSentences(trimmed);
    
    if (chapterRx.test(trimmed)) {
      chs.push({ title: trimmed.slice(0, 60), startIdx: sentIdx });
    } else if (chs.length === 0 && sentIdx === 0) {
      chs.push({ title: 'Introduction', startIdx: 0 });
    }
    sentIdx += sents.length;
  }
  
  // Fallback structural partitioning if single large chunk
  if (chs.length <= 1) {
    const total = parseSentences(text).length;
    if (total > 40) {
      const step = Math.ceil(total / 5);
      const parts = [];
      for (let i = 0; i < total; i += step) {
        parts.push({ title: 'Section ' + (parts.length + 1), startIdx: i });
      }
      return parts;
    }
  }
  return chs;
}

// ── UI Interactions / Layout Controls ────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const s = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (window.innerWidth <= 640) {
    s.classList.toggle('open', sidebarOpen);
    overlay.classList.toggle('show', sidebarOpen);
  } else {
    s.classList.toggle('collapsed', !sidebarOpen);
  }
}

function closeSidebar() {
  if (window.innerWidth <= 640) {
    sidebarOpen = false;
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
}

function toggleChapterDrawer() {
  isDrawerOpen = !isDrawerOpen;
  const drawer = document.getElementById('chapter-drawer');
  const toggleBtn = drawer.querySelector('.ch-toggle');
  drawer.classList.toggle('open', isDrawerOpen);
  toggleBtn.classList.toggle('open', isDrawerOpen);
}

function renderSidebar() {
  const list = document.getElementById('stories-list');
  list.innerHTML = '';
  
  stories.forEach(s => {
    const item = document.createElement('div');
    item.className = 'story-item' + (s.id === currentStoryId ? ' active' : '');
    
    const sents = parseSentences(s.text);
    const progress = sents.length > 1 && s.savedCursor ? Math.round((s.savedCursor / (sents.length - 1)) * 100) : 0;
    
    item.innerHTML = `
      <div class="s-title">${escHtml(s.title)}</div>
      <div class="s-meta">${escHtml(s.author || 'Unknown Author')}</div>
      <div class="s-progress"><div class="s-prog-fill" style="width: ${progress}%"></div></div>
      <button class="s-del" onclick="deleteStory('${s.id}', event)" title="Remove doc">×</button>
    `;
    
    item.addEventListener('click', () => {
      loadStory(s.id);
      closeSidebar();
    });
    list.appendChild(item);
  });
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Story Loading and Rendering Engine ───────────────────────────────────
function loadStory(id) {
  stopPlay();
  currentStoryId = id;
  localStorage.setItem('luminary_active_id', id);
  
  const story = stories.find(s => s.id === id);
  if (!story) return;
  
  document.getElementById('book-title').textContent = `${story.title} · ${story.author || 'Unknown'}`;
  
  sentences = parseSentences(story.text);
  words = story.text.replace(/\n+/g, ' ').split(/\s+/).filter(Boolean);
  
  cursor = story.savedCursor || 0;
  wordIdx = story.savedWordIdx || 0;
  chapters = parseChapters(story.text);
  
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('caption-wrap').style.display = 'flex';
  
  buildChaptersList();
  renderSidebar();
  
  if (wordMode) {
    renderWordMode();
  } else {
    renderCaption();
  }
}

function buildChaptersList() {
  const list = document.getElementById('chapter-list');
  const drawer = document.getElementById('chapter-drawer');
  list.innerHTML = '';
  
  if (chapters.length <= 1) {
    drawer.style.display = 'none';
    return;
  }
  drawer.style.display = 'block';
  
  chapters.forEach((ch, idx) => {
    const el = document.createElement('div');
    el.className = 'ch-item' + (idx === currentChapterIdx ? ' active' : '');
    el.textContent = ch.title;
    el.onclick = () => {
      stopPlay();
      if (wordMode) {
        // Convert sentence index reference to approximate word index bounds
        const targetText = sentences.slice(0, ch.startIdx).join(' ');
        wordIdx = targetText.split(/\s+/).filter(Boolean).length;
        renderWordMode();
      } else {
        cursor = ch.startIdx;
        renderCaption();
      }
      savePos();
    };
    list.appendChild(el);
  });
}

function updateChapterContext() {
  if (chapters.length === 0) {
    document.getElementById('chapter-label').textContent = wordMode ? 'RSVP · Word View' : 'Story Reading';
    return;
  }
  
  let activeCh = 0;
  if (wordMode) {
    // Infer sentence index location from active reading word position mapping
    let currentWordCounter = 0;
    for (let i = 0; i < sentences.length; i++) {
      currentWordCounter += sentences[i].split(/\s+/).filter(Boolean).length;
      if (currentWordCounter >= wordIdx) {
        activeCh = i;
        break;
      }
    }
  } else {
    activeCh = cursor;
  }
  
  let targetIdx = 0;
  for (let i = chapters.length - 1; i >= 0; i--) {
    if (activeCh >= chapters[i].startIdx) {
      targetIdx = i;
      break;
    }
  }
  
  currentChapterIdx = targetIdx;
  document.getElementById('chapter-label').textContent = chapters[targetIdx]?.title || 'Story Content';
  
  document.querySelectorAll('.ch-item').forEach((el, i) => {
    el.classList.toggle('active', i === targetIdx);
  });
}

function renderCaption() {
  updateChapterContext();
  
  const prevLine = sentences[cursor - 1] || '';
  const currLine = sentences[cursor] || '';
  const nextLine = sentences[cursor + 1] || '';
  
  document.getElementById('line-prev').textContent = prevLine;
  document.getElementById('line-current').textContent = currLine;
  document.getElementById('line-next').textContent = nextLine;
  
  const pct = sentences.length > 1 ? (cursor / (sentences.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-scrub-handle').style.left = pct + '%';
  
  document.getElementById('counter').textContent = `${cursor + 1} / ${sentences.length} sents`;
  updateTimeRemaining();
}

function renderWordMode() {
  updateChapterContext();
  document.getElementById('caption-box').style.display = 'none';
  const orpWrap = document.getElementById('orp-wrap');
  orpWrap.style.display = 'flex';
  
  const rawWord = words[wordIdx] || '';
  const orpIdx = getORPIndex(rawWord);
  
  document.getElementById('orp-before').textContent = rawWord.slice(0, orpIdx);
  document.getElementById('orp-letter').textContent = rawWord[orpIdx] || '';
  document.getElementById('orp-after').textContent = rawWord.slice(orpIdx + 1);
  
  const pct = words.length > 1 ? (wordIdx / (words.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-scrub-handle').style.left = pct + '%';
  
  document.getElementById('counter').textContent = `${wordIdx + 1} / ${words.length} words`;
  updateTimeRemaining();
}

// ── Optimal Recognition Point Index Evaluation RSVP ─────────────────────
function getORPIndex(word) {
  const len = word.length;
  if (len <= 1) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 2;
  if (len <= 13) return 3;
  return 4;
}

// ── Dynamic Text Pace Computations & Sliders ─────────────────────────────
function sliderToWPM(v) {
  const minLog = Math.log(60);
  const maxLog = Math.log(850);
  return Math.round(Math.exp(minLog + (v - 1) / 99 * (maxLog - minLog)));
}

function getDelay() {
  const wpm = sliderToWPM(parseInt(document.getElementById('speed-range').value));
  // Baseline assumption of average 8 words per targeted sentence boundary block
  return Math.round((60000 / wpm) * 8);
}

function getWordDelay() {
  const wpm = sliderToWPM(parseInt(document.getElementById('speed-range').value));
  return Math.round(60000 / wpm);
}

function getPunctMultiplier(word) {
  if (/[.!?…]$/.test(word)) return 2.2;
  if (/,;:$/.test(word)) return 1.5;
  return 1.0;
}

function onPaceChange(el) {
  const wpm = sliderToWPM(parseInt(el.value));
  document.getElementById('speed-range').style.setProperty('--pct', ((el.value - 1)/99 * 100) + '%');
  document.getElementById('pace-val').textContent = wpm + ' WPM';
  updateTimeRemaining();
}

function updateTimeRemaining() {
  const range = document.getElementById('speed-range');
  const wpm = sliderToWPM(parseInt(range.value));
  document.getElementById('wpm-val').textContent = wpm + ' wpm';
  
  let remainingWords = 0;
  if (wordMode) {
    remainingWords = Math.max(0, words.length - wordIdx);
  } else {
    for (let i = cursor; i < sentences.length; i++) {
      remainingWords += sentences[i].split(/\s+/).filter(Boolean).length;
    }
  }
  
  const totalMins = Math.ceil(remainingWords / wpm);
  document.getElementById('time-remaining').textContent = remainingWords > 0 ? `${totalMins} min left` : 'Finished';
}

// ── Playback State Loop Machines ─────────────────────────────────────────
function togglePlay() {
  if (!currentStoryId) return;
  playing ? stopPlay() : startPlay();
}

function startPlay() {
  playing = true;
  updatePlayBtn();
  if (wordMode) {
    runWordPlay();
  } else {
    runSentPlay();
  }
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  clearTimeout(wordTimer);
  updatePlayBtn();
  savePos();
}

function runSentPlay() {
  if (!playing) return;
  if (cursor >= sentences.length - 1) {
    stopPlay();
    return;
  }
  cursor++;
  renderCaption();
  playTimer = setTimeout(runSentPlay, getDelay());
}

function runWordPlay() {
  if (!playing) return;
  if (wordIdx >= words.length - 1) {
    stopPlay();
    return;
  }
  wordIdx++;
  renderWordMode();
  const delay = getWordDelay() * getPunctMultiplier(words[wordIdx]);
  wordTimer = setTimeout(runWordPlay, delay);
}

function updatePlayBtn() {
  const icon = document.getElementById('play-icon');
  icon.innerHTML = playing 
    ? '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>' 
    : '<polygon points="6,4 20,12 6,20"></polygon>';
}

function stepForward() {
  stopPlay();
  if (wordMode) {
    wordIdx = Math.min(words.length - 1, wordIdx + 1);
    renderWordMode();
  } else {
    cursor = Math.min(sentences.length - 1, cursor + 1);
    renderCaption();
  }
  savePos();
}

function stepBack() {
  stopPlay();
  if (wordMode) {
    wordIdx = Math.max(0, wordIdx - 1);
    renderWordMode();
  } else {
    cursor = Math.max(0, cursor - 1);
    renderCaption();
  }
  savePos();
}

function restartReader() {
  stopPlay();
  cursor = 0;
  wordIdx = 0;
  if (wordMode) {
    renderWordMode();
  } else {
    renderCaption();
  }
  savePos();
}

function toggleMode() {
  stopPlay();
  wordMode = !wordMode;
  
  const btn = document.getElementById('mode-btn');
  btn.textContent = wordMode ? 'Word' : 'Sentence';
  
  if (wordMode) {
    document.getElementById('caption-box').style.display = 'none';
    document.getElementById('orp-wrap').style.display = 'flex';
    
    // Map sentence cursor to word baseline index positions approximation
    const textAhead = sentences.slice(0, cursor).join(' ');
    wordIdx = textAhead.trim() ? textAhead.split(/\s+/).filter(Boolean).length : 0;
    renderWordMode();
  } else {
    document.getElementById('orp-wrap').style.display = 'none';
    document.getElementById('caption-box').style.display = 'flex';
    
    // Reverse maps active word boundaries count to match active sentences cursor array space
    let runningWords = 0;
    let matchIdx = 0;
    for (let i = 0; i < sentences.length; i++) {
      runningWords += sentences[i].split(/\s+/).filter(Boolean).length;
      if (runningWords >= wordIdx) {
        matchIdx = i;
        break;
      }
    }
    cursor = matchIdx;
    renderCaption();
  }
  savePos();
}

function onScrubProgress(e) {
  if (!currentStoryId) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  
  stopPlay();
  if (wordMode) {
    wordIdx = Math.round(pct * (words.length - 1));
    renderWordMode();
  } else {
    cursor = Math.round(pct * (sentences.length - 1));
    renderCaption();
  }
  savePos();
}

function savePos() {
  const s = stories.find(st => st.id === currentStoryId);
  if (s) {
    s.savedCursor = cursor;
    s.savedWordIdx = wordIdx;
    localStorage.setItem('luminary_stories', JSON.stringify(stories));
  }
}

// ── Look and Feel Presentation Theme Settings ───────────────────────────
function cycleTheme() {
  themeIdx = (themeIdx + 1) % THEMES.length;
  applyTheme();
  showToast('Theme: ' + THEME_LABELS[themeIdx]);
}

function applyTheme() {
  document.body.classList.remove('theme-sepia', 'theme-eink');
  if (themeIdx === 1) document.body.classList.add('theme-sepia');
  if (themeIdx === 2) document.body.classList.add('theme-eink');
  localStorage.setItem('luminary_theme', themeIdx);
}

function cycleFont() {
  fontIdx = (fontIdx + 1) % FONTS.length;
  applyFont();
  showToast('Font: ' + FONT_LABELS[fontIdx]);
}

function applyFont() {
  document.body.classList.remove('font-sans', 'font-dyslexic');
  if (fontIdx === 1) document.body.classList.add('font-sans');
  if (fontIdx === 2) document.body.classList.add('font-dyslexic');
  localStorage.setItem('luminary_font', fontIdx);
}

// ── Modals and File Drag/Drop Implementations ────────────────────────────
function openModal() {
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-author').value = '';
  document.getElementById('inp-text').value = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      document.getElementById('inp-text').value = text;
      showToast('Pasted Contents Successfully ✦');
    }
  } catch {
    showToast('Direct Action Access Blocked — Use Ctrl+V');
  }
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}

function onDragLeave() {
  document.getElementById('drop-zone').classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  onDragLeave();
  const file = e.dataTransfer.files[0];
  if (file) handleReadFile(file);
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) handleReadFile(file);
}

function handleReadFile(file) {
  const reader = new FileReader();
  reader.onload = (evt) => {
    let text = evt.target.result;
    if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
      const sandbox = document.createElement('div');
      sandbox.innerHTML = text;
      text = sandbox.innerText || sandbox.textContent || '';
    }
    document.getElementById('inp-text').value = text;
    document.getElementById('inp-title').value = file.name.replace(/\.[^/.]+$/, "");
    showToast('Document Extracted Effectively ✦');
  };
  reader.readAsText(file);
}

function saveNewStory() {
  const title = document.getElementById('inp-title').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const text = document.getElementById('inp-text').value.trim();
  
  if (!title || !text) {
    showToast('Title and Text Area Fields Required');
    return;
  }
  
  const id = 'custom_' + Date.now();
  const newDoc = { id, title, author, text, savedCursor: 0, savedWordIdx: 0 };
  
  stories.push(newDoc);
  localStorage.setItem('luminary_stories', JSON.stringify(stories));
  
  renderSidebar();
  closeModal();
  loadStory(id);
  showToast('Story Saved To Shelf');
}

function deleteStory(id, event) {
  event.stopPropagation();
  if (!confirm('Permanently remove this entry from your visual library cache?')) return;
  
  stories = stories.filter(s => s.id !== id);
  localStorage.setItem('luminary_stories', JSON.stringify(stories));
  
  if (currentStoryId === id) {
    currentStoryId = null;
    localStorage.removeItem('luminary_active_id');
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('caption-wrap').style.display = 'none';
    document.getElementById('book-title').textContent = '—';
  }
  renderSidebar();
  showToast('Document Erased');
}

// ── Preferences Config Modals ────────────────────────────────────────────
function openSettings() {
  document.getElementById('settings-key-input').value = localStorage.getItem('luminary_tts_key') || '';
  document.getElementById('tts-voice-select').value = localStorage.getItem('luminary_tts_voice') || 'en-US-Journey-F';
  
  const stateLabel = document.getElementById('settings-status');
  if (localStorage.getItem('luminary_tts_key')) {
    stateLabel.textContent = '✦ API Credentials Saved Locally';
    stateLabel.className = 'settings-status ok';
  } else {
    stateLabel.textContent = 'No Cloud Credentials Configured';
    stateLabel.className = 'settings-status';
  }
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function saveSettings() {
  const key = document.getElementById('settings-key-input').value.trim();
  const voice = document.getElementById('tts-voice-select').value;
  
  localStorage.setItem('luminary_tts_key', key);
  localStorage.setItem('tts_voice_select', voice);
  localStorage.setItem('luminary_tts_voice', voice);
  
  showToast('Preferences Synced');
  closeSettings();
}

// ── Google Cloud Audio Text-To-Speech (TTS) Integration System ───────────
let ttsPlaying = false;
let ttsAudio = null;
let nextUrl = null;

async function toggleTTS() {
  if (ttsPlaying) {
    stopTTS();
    return;
  }
  
  const key = localStorage.getItem('luminary_tts_key');
  if (!key) {
    showToast('Configure Cloud API Key in Preferences First');
    openSettings();
    return;
  }
  
  if (!currentStoryId) return;
  stopPlay();
  await runTTSLoop();
}

function stopTTS() {
  ttsPlaying = false;
  document.getElementById('tts-btn').classList.remove('tts-active');
  if (ttsAudio) {
    ttsAudio.pause();
    ttsAudio.src = '';
    ttsAudio = null;
  }
  if (nextUrl) {
    URL.revokeObjectURL(nextUrl);
    nextUrl = null;
  }
}

async function runTTSLoop() {
  const btn = document.getElementById('tts-btn');
  btn.classList.add('tts-active');
  ttsPlaying = true;
  
  while (ttsPlaying) {
    try {
      // Determine what text slice needs synthesis processing
      const textToSpeak = wordMode 
        ? words.slice(wordIdx, Math.min(words.length, wordIdx + 15)).join(' ')
        : (sentences[cursor] || '');
        
      if (!textToSpeak.trim()) {
        stopTTS();
        break;
      }
      
      let url = nextUrl;
      nextUrl = null;
      
      if (!url) {
        url = await fetchTTSAudio(textToSpeak);
      }
      
      if (!ttsPlaying) {
        if (url) URL.revokeObjectURL(url);
        break;
      }
      
      // Async prefetch background logic processing optimization block
      const nextText = wordMode
        ? words.slice(Math.min(words.length, wordIdx + 15), Math.min(words.length, wordIdx + 30)).join(' ')
        : (sentences[cursor + 1] || '');
        
      const prefetchPromise = nextText.trim() 
        ? fetchTTSAudio(nextText).then(u => { nextUrl = u; }).catch(() => {})
        : Promise.resolve();
        
      await playAudioUrl(url);
      await prefetchPromise;
      
    } catch (e) {
      stopTTS();
      showToast('TTS Engine Error: ' + (e.message || 'Check Cloud API Key'));
      break;
    }
    
    if (!ttsPlaying) break;
    
    // Advance Active Position States
    if (wordMode) {
      wordIdx = Math.min(words.length - 1, wordIdx + 15);
      renderWordMode();
    } else {
      if (cursor >= sentences.length - 1) {
        stopTTS();
        break;
      }
      cursor++;
      renderCaption();
    }
    savePos();
  }
}

async function fetchTTSAudio(text) {
  const key = localStorage.getItem('luminary_tts_key');
  const voice = localStorage.getItem('luminary_tts_voice') || 'en-US-Journey-F';
  
  const apiEndpoint = `https://texttospeech.googleapis.com/v1/text:synthesize?key=${key}`;
  const payload = {
    input: { text: text },
    voice: { languageCode: 'en-US', name: voice },
    audioConfig: { audioEncoding: 'MP3' }
  };
  
  const response = await fetch(apiEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  
  if (!response.ok) {
    const dataErr = await response.json().catch(() => ({}));
    throw new Error(dataErr.error?.message || 'Synthesis engine failed response check');
  }
  
  const data = await response.json();
  const rawBytes = b64ToBytes(data.audioContent);
  const blob = new Blob([rawBytes], { type: 'audio/mp3' });
  return URL.createObjectURL(blob);
}

function playAudioUrl(url) {
  return new Promise((resolve, reject) => {
    if (ttsAudio) {
      ttsAudio.pause();
    }
    ttsAudio = new Audio(url);
    ttsAudio.onended = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    ttsAudio.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('Audio processing playback track broken'));
    };
    ttsAudio.play().catch(reject);
  });
}

function b64ToBytes(b64) {
  const binaryString = atob(b64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes;
}

// ── System Utilities ─────────────────────────────────────────────────────
function showToast(msg) {
  let toast = document.getElementById('app-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'app-toast';
    toast.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--gold); color:var(--text); padding:10px 18px; font-family:var(--font-ui); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; border-radius:3px; z-index:9999; pointer-events:none; opacity:0; transition:opacity 0.25s ease;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2200);
}

// Global Keyboard Bindings Controls Listener
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    togglePlay();
  }
  if (e.code === 'ArrowRight') stepForward();
  if (e.code === 'ArrowLeft') stepBack();
});
</script>
