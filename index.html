<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luminary">
<meta name="theme-color" content="#080a0e">
<title>Luminary — Story Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Josefin+Sans:wght@200;300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080a0e;
  --bg2: #0e1118;
  --bg3: #141820;
  --surface: #1a2030;
  --border: rgba(180,160,120,0.12);
  --border2: rgba(180,160,120,0.22);
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --text: #e8e0d0;
  --text2: #a09880;
  --text3: #5a5245;
  --active: rgba(201,168,76,0.08);
  --font-title: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', serif;
  --font-ui: 'Josefin Sans', sans-serif;
  --spd: 0.3s;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
/* Warm Sepia theme */
.theme-sepia {
  --bg: #1a1408; --bg2: #211a0d; --bg3: #2a2010;
  --surface: #33280f; --border: rgba(200,170,100,0.15); --border2: rgba(200,170,100,0.28);
  --gold: #d4a84c; --gold2: #f0c96a; --gold-dim: rgba(212,168,76,0.15);
  --text: #f5ead0; --text2: #b8a070; --text3: #6a5a35; --active: rgba(212,168,76,0.1);
}
/* E-Ink theme */
.theme-eink {
  --bg: #f8f6f0; --bg2: #ede9e0; --bg3: #e0dbd0;
  --surface: #d0cac0; --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
  --gold: #1a1a1a; --gold2: #000; --gold-dim: rgba(0,0,0,0.06);
  --text: #111; --text2: #555; --text3: #999; --active: rgba(0,0,0,0.05);
}

html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; transition: background 0.4s, color 0.4s; }

#app { display: flex; height: 100dvh; position: relative; overflow: hidden; }

/* Sidebar overlay */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 19;
  opacity: 0; transition: opacity var(--spd);
}
#sidebar-overlay.show { opacity: 1; }

/* Sidebar */
#sidebar {
  width: 280px; min-width: 280px;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform var(--spd) cubic-bezier(.4,0,.2,1);
  z-index: 20; flex-shrink: 0;
}

@media (max-width: 640px) {
  #sidebar-overlay { display: block; pointer-events: none; }
  #sidebar-overlay.show { pointer-events: all; }
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: 4px 0 32px rgba(0,0,0,0.6); padding-top: var(--safe-top); }
  #sidebar.open { transform: translateX(0); }
}
@media (min-width: 641px) {
  #sidebar { transform: translateX(0) !important; }
  #sidebar.collapsed { transform: translateX(-280px) !important; margin-right: -280px; }
}

.sidebar-header { padding: 28px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: var(--font-title); font-size: 18px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; }
.logo-sub { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.3em; color: var(--text3); text-transform: uppercase; margin-top: 3px; }

/* Chapter index drawer */
#chapter-drawer {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
  flex-shrink: 0;
}
#chapter-drawer.open { max-height: 220px; }
#chapter-list { overflow-y: auto; max-height: 220px; padding: 6px 0; }
#chapter-list::-webkit-scrollbar { width: 3px; }
#chapter-list::-webkit-scrollbar-thumb { background: var(--border2); }
.ch-item {
  padding: 8px 24px; cursor: pointer; font-family: var(--font-ui);
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text2); border-left: 2px solid transparent;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.ch-item:hover, .ch-item:active { background: var(--active); color: var(--gold); }
.ch-item.active { color: var(--gold); border-left-color: var(--gold); }
.ch-toggle {
  width: 100%; padding: 8px 24px; background: none; border: none;
  border-bottom: 1px solid var(--border); cursor: pointer;
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text3); text-align: left;
  display: flex; align-items: center; justify-content: space-between;
  transition: color 0.2s; -webkit-tap-highlight-color: transparent;
}
.ch-toggle:hover { color: var(--gold2); }
.ch-toggle-arrow { transition: transform 0.3s; }
.ch-toggle.open .ch-toggle-arrow { transform: rotate(180deg); }

#stories-list { flex: 1; overflow-y: auto; padding: 12px 0; }
#stories-list::-webkit-scrollbar { width: 3px; }
#stories-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.story-item {
  padding: 12px 24px; cursor: pointer; border-left: 2px solid transparent;
  transition: all 0.2s; position: relative; -webkit-tap-highlight-color: transparent;
}
.story-item:hover, .story-item:active { background: var(--active); }
.story-item.active { background: var(--gold-dim); border-left-color: var(--gold); }
.story-item .s-title { font-family: var(--font-body); font-size: 15px; color: var(--text); line-height: 1.3; padding-right: 28px; }
.story-item.active .s-title { color: var(--gold2); }
.story-item .s-meta { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-top: 3px; }
.story-item .s-progress { height: 2px; background: var(--border); margin-top: 6px; border-radius: 1px; overflow: hidden; }
.story-item .s-prog-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.3s; }
.story-item .s-del {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 18px; padding: 6px; line-height: 1; border-radius: 50%;
  transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent;
}
.story-item .s-del:hover, .story-item .s-del:active { color: #c05555; background: rgba(192,85,85,0.1); }

.add-btn {
  margin: 12px 16px calc(12px + var(--safe-bot)); padding: 11px 0;
  background: none; border: 1px solid var(--border2); color: var(--gold);
  font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; cursor: pointer; border-radius: 2px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.add-btn:hover, .add-btn:active { background: var(--gold-dim); border-color: var(--gold); }
.add-btn::before { content: '+'; font-size: 16px; font-weight: 300; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Top bar */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; padding-top: calc(10px + var(--safe-top));
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 5; flex-shrink: 0;
}
#toggle-sidebar {
  background: none; border: none; cursor: pointer; color: var(--text2);
  padding: 6px; display: flex; border-radius: 4px;
  transition: color 0.2s, background 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#toggle-sidebar:hover, #toggle-sidebar:active { color: var(--gold); background: var(--active); }
#toggle-sidebar svg { width: 18px; height: 18px; }

#book-title {
  font-family: var(--font-title); font-size: 12px; letter-spacing: 0.12em;
  color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
}

/* WPM display */
#wpm-display {
  display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0;
}
#wpm-val { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.1em; color: var(--gold); line-height: 1; }
#time-remaining { font-family: var(--font-ui); font-size: 8px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-top: 2px; white-space: nowrap; }

/* Font toggle */
#font-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; padding: 5px 8px;
  border-radius: 2px; transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#font-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Theme button */
#theme-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; padding: 5px 8px;
  border-radius: 2px; transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
#theme-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Pace slider */
.pace-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.pace-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
.pace-val { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em; color: var(--gold); min-width: 44px; text-align: right; }

#speed-range {
  -webkit-appearance: none; appearance: none; width: 80px; height: 3px;
  background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct, 40%), var(--border2) var(--pct, 40%), var(--border2) 100%);
  border-radius: 2px; outline: none; cursor: pointer; flex-shrink: 0;
}
#speed-range::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.5);
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
#speed-range::-webkit-slider-thumb:hover, #speed-range:active::-webkit-slider-thumb { transform: scale(1.3); box-shadow: 0 0 12px rgba(201,168,76,0.7); }
#speed-range::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--gold); border: none; box-shadow: 0 0 6px rgba(201,168,76,0.5); cursor: pointer; }
#speed-range::-moz-range-track { background: var(--border2); height: 3px; border-radius: 2px; }
#speed-range::-moz-range-progress { background: var(--gold); height: 3px; border-radius: 2px; }

.ctrl-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ctrl-btn {
  background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  padding: 6px 10px; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:hover, .ctrl-btn:active { border-color: var(--gold); color: var(--gold); }
.ctrl-btn.active-btn { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

@media (max-width: 540px) {
  #topbar { flex-wrap: wrap; padding: 8px 12px; padding-top: calc(8px + var(--safe-top)); gap: 6px; }
  #book-title { font-size: 10px; width: calc(100% - 40px); flex-basis: calc(100% - 40px); order: 1; }
  #toggle-sidebar { order: 0; }
  .pace-wrap { order: 3; flex: 1; }
  #speed-range { width: 100%; flex: 1; }
  .ctrl-group { order: 2; margin-left: auto; }
  #wpm-display { order: 4; }
  #font-btn, #theme-btn { display: none; }
  #mobile-settings-btn { display: flex !important; }
}
@media (min-width: 541px) {
  #mobile-settings-btn { display: none !important; }
}

#mobile-settings-btn {
  display: none; background: none; border: 1px solid var(--border); color: var(--text2);
  padding: 6px 8px; border-radius: 2px; cursor: pointer; font-size: 14px;
  transition: all 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; align-items: center;
}
#mobile-settings-btn:active { border-color: var(--gold); color: var(--gold); }

/* Settings drawer (mobile) */
#settings-drawer {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease; flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 8px; padding: 0;
}
#settings-drawer.open { max-height: 80px; padding: 10px 14px; }

/* Stage */
#stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); overflow: hidden; position: relative;
}
#stage::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 70%);
  pointer-events: none;
}

/* Caption */
#caption-wrap {
  width: 100%; max-width: 820px; padding: 0 32px;
  display: flex; flex-direction: column; align-items: center;
}
@media (max-width: 480px) { #caption-wrap { padding: 0 20px; } }

/* Progress bar — clickable */
#progress-bar {
  width: 100%; height: 3px; background: var(--border);
  margin-bottom: 28px; position: relative; border-radius: 2px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
#progress-bar:hover { height: 5px; margin-bottom: 26px; }
#progress-fill {
  position: absolute; left: 0; top: 0;
  height: 100%; background: var(--gold); border-radius: 2px;
  transition: width 0.35s ease; box-shadow: 0 0 8px rgba(201,168,76,0.4);
}
#progress-scrub-handle {
  position: absolute; top: 50%; width: 12px; height: 12px;
  background: var(--gold); border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.15s; pointer-events: none;
  box-shadow: 0 0 10px rgba(201,168,76,0.6);
}
#progress-bar:hover #progress-scrub-handle, #progress-bar:active #progress-scrub-handle { transform: translate(-50%, -50%) scale(1); }

#chapter-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text3); margin-bottom: 24px; }

/* ORP word mode wrapper */
#orp-wrap {
  display: none; align-items: center; justify-content: center;
  min-height: 100px; position: relative;
}
#orp-before { font-family: var(--font-body); font-size: 28px; color: var(--text); opacity: 0.9; font-weight: 300; }
#orp-letter { font-family: var(--font-body); font-size: 28px; color: var(--gold2); font-weight: 400; text-shadow: 0 0 20px rgba(232,201,122,0.4); }
#orp-after { font-family: var(--font-body); font-size: 28px; color: var(--text); opacity: 0.9; font-weight: 300; }
#orp-guide {
  position: absolute; bottom: -12px; width: 1px; height: 6px;
  background: var(--gold); opacity: 0.5; left: 50%;
}

#caption-box {
  text-align: center; min-height: 140px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.caption-line {
  font-family: var(--font-body); line-height: 1.55; font-weight: 300;
  letter-spacing: 0.01em; max-width: 680px;
  transition: opacity 0.25s, transform 0.3s;
}
.caption-line.prev { opacity: 0.14; font-size: 17px; margin-bottom: 10px; transform: translateY(-4px); font-style: italic; color: var(--text2); }
.caption-line.current { opacity: 1; font-size: 28px; }
.caption-line.next { opacity: 0.16; font-size: 17px; margin-top: 10px; transform: translateY(4px); font-style: italic; color: var(--text2); }

/* DM Sans font override */
body.font-sans .caption-line, body.font-sans #orp-before, body.font-sans #orp-letter, body.font-sans #orp-after {
  font-family: 'DM Sans', sans-serif;
}
body.font-dyslexic .caption-line, body.font-dyslexic #orp-before, body.font-dyslexic #orp-letter, body.font-dyslexic #orp-after {
  font-family: 'Arial', sans-serif; letter-spacing: 0.05em; word-spacing: 0.1em;
}

@media (max-width: 480px) {
  .caption-line.current { font-size: 22px; }
  .caption-line.prev, .caption-line.next { font-size: 14px; }
  #caption-box { min-height: 120px; }
  #orp-before, #orp-letter, #orp-after { font-size: 22px; }
}

.caption-line.current .word { display: inline; transition: color 0.15s, text-shadow 0.15s; }
.caption-line.current .word.lit { color: var(--gold2); text-shadow: 0 0 20px rgba(232,201,122,0.3); }

#counter { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em; color: var(--text3); margin-top: 24px; }

/* Nav controls */
#nav-controls { display: flex; align-items: center; gap: 20px; margin-top: 32px; padding-bottom: var(--safe-bot); }
.nav-btn {
  background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover, .nav-btn:active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.nav-btn svg { width: 16px; height: 16px; }

#play-btn {
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px solid var(--gold); background: var(--gold-dim);
  color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
#play-btn:hover, #play-btn:active { background: rgba(201,168,76,0.25); }
#play-btn svg { width: 22px; height: 22px; }

/* Empty state */
#empty-state { text-align: center; padding: 20px; }
#empty-state .e-icon { font-size: 40px; margin-bottom: 20px; opacity: 0.2; }
#empty-state .e-title { font-family: var(--font-title); font-size: 20px; color: var(--text2); letter-spacing: 0.12em; margin-bottom: 10px; }
#empty-state .e-sub { font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text3); }

/* Modal */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s; backdrop-filter: blur(4px);
}
#modal-overlay.open { opacity: 1; pointer-events: all; }
@media (min-width: 600px) { #modal-overlay { align-items: center; } #modal { border-radius: 4px; max-height: 90vh; } }

#modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px 12px 0 0; width: 100%; max-width: 580px;
  max-height: 92dvh; overflow-y: auto; padding: 28px 24px;
  padding-bottom: calc(28px + var(--safe-bot));
  transform: translateY(24px); transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}
#modal-overlay.open #modal { transform: translateY(0); }

.modal-title { font-family: var(--font-title); font-size: 15px; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 24px; text-transform: uppercase; }
.field { margin-bottom: 18px; }
.field label { display: block; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }
.field input, .field textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--font-body); font-size: 15px;
  padding: 10px 14px; border-radius: 2px; outline: none; resize: vertical;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.field input:focus, .field textarea:focus { border-color: var(--gold); }
.field textarea { min-height: 160px; line-height: 1.6; }

/* File drop zone */
#drop-zone {
  border: 1px dashed var(--border2); border-radius: 2px;
  padding: 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; margin-bottom: 18px;
  -webkit-tap-highlight-color: transparent;
}
#drop-zone:hover, #drop-zone.drag-over { border-color: var(--gold); background: var(--gold-dim); }
#drop-zone p { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); }
#drop-zone p span { color: var(--gold); }
#file-input { display: none; }

.modal-row { display: flex; gap: 10px; }
.modal-row .field { flex: 1; }

.modal-actions { display: flex; gap: 10px; justify-content: space-between; margin-top: 24px; align-items: center; }
.btn-paste {
  background: none; border: 1px solid var(--border2); color: var(--text3); cursor: pointer;
  padding: 8px 14px; font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-paste:hover { border-color: var(--text2); color: var(--text2); }
.modal-btns { display: flex; gap: 10px; }
.btn-cancel {
  background: none; border: 1px solid var(--border2); color: var(--text2); cursor: pointer;
  padding: 9px 18px; font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-cancel:hover { border-color: var(--text2); }
.btn-save {
  background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); cursor: pointer;
  padding: 9px 22px; font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-save:hover, .btn-save:active { background: rgba(201,168,76,0.25); }

/* Toast */
#toast {
  position: fixed; bottom: calc(20px + var(--safe-bot)); left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.15em;
  padding: 10px 20px; border-radius: 2px; z-index: 200; white-space: nowrap;
  transition: transform 0.3s, opacity 0.3s; opacity: 0;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.caption-fresh { animation: fadeInUp 0.28s ease forwards; }

#modal::-webkit-scrollbar { width: 4px; }
#modal::-webkit-scrollbar-thumb { background: var(--border2); }
.field textarea::-webkit-scrollbar { width: 4px; }
.field textarea::-webkit-scrollbar-thumb { background: var(--border2); }
#stories-list::-webkit-scrollbar { width: 3px; }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Luminary</div>
      <div class="logo-sub">Story Reader</div>
    </div>
    <!-- Chapter drawer (populated per story) -->
    <div id="chapter-drawer">
      <div id="chapter-list"></div>
    </div>
    <div id="stories-list"></div>
    <button class="add-btn" onclick="openModal()">Add Story</button>
  </div>

  <div id="main">
    <div id="topbar">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <span id="book-title">—</span>

      <div class="ctrl-group">
        <button class="ctrl-btn" id="mode-btn" onclick="toggleMode()">Word</button>
        <button class="ctrl-btn" onclick="restartReader()">↺</button>
      </div>

      <div class="pace-wrap">
        <span class="pace-label">Pace</span>
        <input type="range" id="speed-range" min="1" max="100" value="40" title="Reading speed" oninput="onPaceChange(this)">
        <span class="pace-val" id="pace-val">—</span>
      </div>

      <div id="wpm-display">
        <span id="wpm-val">— wpm</span>
        <span id="time-remaining">—</span>
      </div>

      <button id="font-btn" onclick="cycleFont()" title="Change font">Aa</button>
      <button id="theme-btn" onclick="cycleTheme()" title="Change theme">◑</button>
      <button id="mobile-settings-btn" onclick="toggleSettingsDrawer()">⚙</button>
    </div>

    <!-- Mobile settings drawer -->
    <div id="settings-drawer">
      <button class="ctrl-btn" onclick="cycleFont()">Font: <span id="font-label-m">Serif</span></button>
      <button class="ctrl-btn" onclick="cycleTheme()">Theme: <span id="theme-label-m">Midnight</span></button>
    </div>

    <div id="stage">
      <div id="empty-state">
        <div class="e-icon">✦</div>
        <div class="e-title">No Story Selected</div>
        <div class="e-sub">Choose a story from the library, or add your own</div>
      </div>

      <div id="caption-wrap" style="display:none">
        <div id="chapter-label"></div>
        <div id="progress-bar">
          <div id="progress-fill" style="width:0%"></div>
          <div id="progress-scrub-handle"></div>
        </div>
        <!-- ORP Word Mode display -->
        <div id="orp-wrap">
          <span id="orp-before"></span><span id="orp-letter"></span><span id="orp-after"></span>
          <div id="orp-guide"></div>
        </div>
        <div id="caption-box">
          <div class="caption-line prev" id="line-prev"></div>
          <div class="caption-line current" id="line-current"></div>
          <div class="caption-line next" id="line-next"></div>
        </div>
        <div id="counter"></div>
        <div id="nav-controls">
          <button class="nav-btn" onclick="stepBack()" title="Previous (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button id="play-btn" onclick="togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
          </button>
          <button class="nav-btn" onclick="stepForward()" title="Next (→)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Story Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title">Add New Story</div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <p>Drop a <span>.txt</span> or <span>.html</span> file here, or <span>tap to browse</span></p>
      <input type="file" id="file-input" accept=".txt,.html,.htm,.epub" onchange="onFileSelect(event)">
    </div>
    <div class="modal-row">
      <div class="field">
        <label>Title</label>
        <input type="text" id="inp-title" placeholder="The Midnight Garden…" autocomplete="off">
      </div>
      <div class="field">
        <label>Author (optional)</label>
        <input type="text" id="inp-author" placeholder="Anonymous" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <label>Story Text</label>
      <textarea id="inp-text" placeholder="Paste or write your story here…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-paste" onclick="pasteFromClipboard()">⌘ Paste</button>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveStory()">Save Story</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Default stories ──────────────────────────────────────────────────
const DEFAULT_STORIES = [
  {
    id: 's1', title: 'The Last Light', author: 'A. Morrow',
    text: `She found the lighthouse on the third day of searching. It rose from the cliffs like a pale finger pointing at a sky it no longer believed in. The lantern room was dark, of course — it had been dark for thirty years, ever since the ships stopped coming.

Elena climbed the iron stairs slowly, one hand trailing the curved wall, feeling the cold seep through stone that had swallowed decades of sea wind. She counted the steps without meaning to. Forty-two. The same as always.

At the top, the great lens sat dormant and dusty, its prisms catching the grey afternoon light and breaking it into colors that had no business being this sad. She pressed her palm to the glass. It was warmer than the air outside. Strange.

She had come looking for her grandfather's logbooks. What she found instead was a candle, half-burned, sitting in a brass holder on the keeper's table. It was recent. She could tell by the soft waxy smell, by the way the wick had not yet blackened with age.

Someone still came here. Someone still kept the light — even a small one, even a secret one — burning in the dark.`
  },
  {
    id: 's2', title: 'The Letter', author: 'P. Vasquez',
    text: `The letter arrived on a Tuesday, which was unusual. Not because Tuesday was a strange day for letters — but because the address was written in her own handwriting, and she had never sent anything to herself.

She stood at the door in her bathrobe, holding the envelope up to the morning light as if she could see through it. The stamps were unfamiliar. The postmark was smeared beyond reading.

Inside was a single sheet of paper. At the top, the date: September 14th — six years from now.

"Don't take the job in Oslo," it began. "Not because it goes badly. It goes beautifully. But you will fall in love with the city and forget to come home, and there are things here that need you."

She read it three times standing in the doorway, the cold air making her toes ache.

At the bottom, just above the signature, there was a small drawing: a house she did not recognize, surrounded by trees, with a light in every window. She felt certain, with a conviction she could not explain, that she had drawn it herself.`
  },
  {
    id: 's3', title: 'The Cartographer', author: 'I. Osei',
    text: `He spent forty years making maps of places he had never been. Not imaginary places — real ones. Countries, coastlines, mountain ranges surveyed by others and handed to him in notes and measurements and rough sketches that he translated into the clean lines of geography.

He knew the shape of every continent by touch, could trace the curve of rivers in the dark. But he had never left the city where he was born.

When he finally retired, his daughter bought him a plane ticket to Iceland — to a fjord he had mapped in 1987 from a colleague's photographs. He stood at the water's edge in the thin arctic light and looked at the mountains he had drawn so carefully, and felt something he could not name.

The proportions were almost right. The feeling was entirely wrong.

No map, he understood, could ever hold the way cold air catches in the lungs like something living. No contour line captures the particular silence of water that has never heard a human voice.

He had spent forty years making accurate documents of other people's astonishment. He had only a few left to gather his own.`
  }
];

// ── State ──────────────────────────────────────────────────────────────
let stories = JSON.parse(localStorage.getItem('luminary_stories') || 'null') || JSON.parse(JSON.stringify(DEFAULT_STORIES));
let currentStoryId = null;
let sentences = [];
let cursor = 0;
let playing = false;
let playTimer = null;
let wordTimer = null;
let sidebarOpen = window.innerWidth > 640;
let wordMode = false;
let words = [];
let wordIdx = 0;
let chapters = [];
let currentChapterIdx = 0;
let settingsDrawerOpen = false;

// Theme/font state
const THEMES = ['midnight', 'sepia', 'eink'];
const THEME_LABELS = ['Midnight', 'Sepia', 'E-Ink'];
let themeIdx = parseInt(localStorage.getItem('luminary_theme') || '0');
const FONTS = ['serif', 'sans', 'dyslexic'];
const FONT_LABELS = ['Serif', 'Sans', 'OpenDys'];
let fontIdx = parseInt(localStorage.getItem('luminary_font') || '0');

// ── Persist ─────────────────────────────────────────────────────────
function save() { localStorage.setItem('luminary_stories', JSON.stringify(stories)); }
function savePos() {
  if (!currentStoryId) return;
  const s = stories.find(s => s.id === currentStoryId);
  if (s) { s.savedCursor = cursor; s.savedWordIdx = wordIdx; save(); renderSidebar(); }
}

// ── Theme & Font ────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.remove('theme-sepia', 'theme-eink');
  if (themeIdx === 1) document.body.classList.add('theme-sepia');
  if (themeIdx === 2) document.body.classList.add('theme-eink');
  document.getElementById('theme-label-m').textContent = THEME_LABELS[themeIdx];
  localStorage.setItem('luminary_theme', themeIdx);
}
function cycleTheme() {
  themeIdx = (themeIdx + 1) % THEMES.length;
  applyTheme();
  showToast('Theme: ' + THEME_LABELS[themeIdx]);
}
function applyFont() {
  document.body.classList.remove('font-sans', 'font-dyslexic');
  if (fontIdx === 1) document.body.classList.add('font-sans');
  if (fontIdx === 2) document.body.classList.add('font-dyslexic');
  document.getElementById('font-label-m').textContent = FONT_LABELS[fontIdx];
  localStorage.setItem('luminary_font', fontIdx);
}
function cycleFont() {
  fontIdx = (fontIdx + 1) % FONTS.length;
  applyFont();
  showToast('Font: ' + FONT_LABELS[fontIdx]);
}

// ── Pace slider ─────────────────────────────────────────────────────
// WPM mapping: slider 1–100 → ~60wpm (slow) to ~900wpm (fast)
function sliderToWPM(v) {
  const minLog = Math.log(60), maxLog = Math.log(900);
  return Math.round(Math.exp(minLog + (v - 1) / 99 * (maxLog - minLog)));
}
function getDelay() {
  const wpm = sliderToWPM(parseInt(document.getElementById('speed-range').value));
  // avg 10 words/sentence → ms per sentence
  return Math.round(60000 / wpm * 10);
}
function getWordDelay() {
  const wpm = sliderToWPM(parseInt(document.getElementById('speed-range').value));
  return Math.round(60000 / wpm);
}
// Punctuation delay multipliers (Smart RSVP)
function getPunctMultiplier(word) {
  if (!word) return 1;
  if (/[.!?…]$/.test(word)) return 2.2;
  if (/[,;—–]/.test(word)) return 1.5;
  return 1;
}
function updateWPMDisplay() {
  const v = parseInt(document.getElementById('speed-range').value);
  const wpm = sliderToWPM(v);
  document.getElementById('wpm-val').textContent = wpm + ' wpm';
  updateTimeRemaining();
}
function updateTimeRemaining() {
  if (!currentStoryId) return;
  const v = parseInt(document.getElementById('speed-range').value);
  const wpm = sliderToWPM(v);
  let remaining;
  if (wordMode) {
    remaining = words.length - wordIdx;
  } else {
    const totalWords = words.length;
    const fraction = sentences.length > 1 ? (sentences.length - cursor) / sentences.length : 1;
    remaining = Math.round(totalWords * fraction);
  }
  const mins = remaining / wpm;
  if (mins < 1) document.getElementById('time-remaining').textContent = '< 1 min left';
  else document.getElementById('time-remaining').textContent = Math.ceil(mins) + ' min' + (Math.ceil(mins) > 1 ? 's' : '') + ' left';
}

function onPaceChange(el) {
  const v = parseInt(el.value);
  const pct = ((v - 1) / 99 * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
  updateWPMDisplay();
  if (playing) {
    clearTimeout(playTimer); clearTimeout(wordTimer);
    if (wordMode) runWordPlay(); else runSentPlay();
  }
}

(function() {
  const el = document.getElementById('speed-range');
  const v = parseInt(el.value);
  const pct = ((v - 1) / 99 * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
  updateWPMDisplay();
  applyTheme(); applyFont();
})();

// ── Parse ───────────────────────────────────────────────────────────
function parseSentences(text) {
  return text.match(/[^.!?…]+[.!?…]+["']?/g)?.map(s => s.trim()).filter(Boolean)
    || text.split('\n').filter(Boolean);
}

// Chapter detection: double line breaks or "Chapter X/N" headings
function parseChapters(text) {
  const chapterRx = /^(chapter\s+[\w\d]+[\s:—–-]*.*?)$/im;
  const blocks = text.split(/\n{2,}/);
  const chs = [];
  let sentIdx = 0;
  let accSents = [];
  for (const block of blocks) {
    const trimmed = block.trim();
    if (!trimmed) continue;
    const sents = parseSentences(trimmed);
    if (chapterRx.test(trimmed) && accSents.length > 0) {
      chs.push({ title: accSents.join(' ').slice(0, 50), startIdx: sentIdx - accSents.length });
      accSents = [];
    }
    if (chapterRx.test(trimmed)) {
      chs.push({ title: trimmed.slice(0, 60), startIdx: sentIdx });
    }
    accSents.push(...sents);
    sentIdx += sents.length;
  }
  // Fallback: split by every ~30 sentences
  if (chs.length < 2) {
    const total = parseSentences(text).length;
    if (total > 50) {
      const step = Math.max(20, Math.floor(total / 5));
      const result = [];
      for (let i = 0; i < total; i += step) result.push({ title: 'Part ' + (result.length + 1), startIdx: i });
      return result;
    }
    return [];
  }
  return chs;
}

function updateChapterLabel() {
  if (chapters.length === 0) {
    document.getElementById('chapter-label').textContent = wordMode ? 'Word Mode' : 'Reading';
    return;
  }
  let idx = 0;
  for (let i = chapters.length - 1; i >= 0; i--) {
    if (cursor >= chapters[i].startIdx) { idx = i; break; }
  }
  currentChapterIdx = idx;
  document.getElementById('chapter-label').textContent = chapters[idx]?.title || 'Reading';
  // highlight in chapter list
  document.querySelectorAll('.ch-item').forEach((el, i) => el.classList.toggle('active', i === idx));
}

function renderChapterDrawer() {
  const drawer = document.getElementById('chapter-drawer');
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  if (chapters.length < 2) { drawer.classList.remove('open'); return; }
  // toggle button
  const existing = document.querySelector('.ch-toggle');
  if (existing) existing.remove();
  const toggle = document.createElement('button');
  toggle.className = 'ch-toggle';
  toggle.innerHTML = `<span>Chapters (${chapters.length})</span><span class="ch-toggle-arrow">▾</span>`;
  toggle.onclick = () => {
    drawer.classList.toggle('open');
    toggle.classList.toggle('open');
  };
  drawer.parentNode.insertBefore(toggle, drawer);

  chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'ch-item' + (i === currentChapterIdx ? ' active' : '');
    item.textContent = ch.title;
    item.onclick = () => {
      stopPlay(); cursor = ch.startIdx; renderCaption(); savePos();
      if (window.innerWidth <= 640) closeSidebar();
    };
    list.appendChild(item);
  });
}

// ── Sidebar ──────────────────────────────────────────────────────────
function toggleSidebar() {
  const isMobile = window.innerWidth <= 640;
  if (isMobile) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    if (sidebar.classList.contains('open')) closeSidebar();
    else { sidebar.classList.add('open'); overlay.classList.add('show'); }
  } else {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function toggleSettingsDrawer() {
  settingsDrawerOpen = !settingsDrawerOpen;
  document.getElementById('settings-drawer').classList.toggle('open', settingsDrawerOpen);
}

// ── Render sidebar ───────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('stories-list');
  el.innerHTML = '';
  stories.forEach(s => {
    const item = document.createElement('div');
    item.className = 'story-item' + (s.id === currentStoryId ? ' active' : '');
    const totalSents = parseSentences(s.text).length;
    const progPct = totalSents > 1 && s.savedCursor ? Math.round((s.savedCursor / (totalSents - 1)) * 100) : 0;
    item.innerHTML = `
      <div class="s-title">${escHtml(s.title)}</div>
      <div class="s-meta">${escHtml(s.author || 'Unknown')}</div>
      <div class="s-progress"><div class="s-prog-fill" style="width:${progPct}%"></div></div>
      <button class="s-del" onclick="deleteStory('${s.id}', event)" title="Remove">×</button>
    `;
    item.addEventListener('click', () => { loadStory(s.id); if (window.innerWidth <= 640) closeSidebar(); });
    el.appendChild(item);
  });
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Load story ────────────────────────────────────────────────────────
function loadStory(id) {
  stopPlay();
  currentStoryId = id;
  const story = stories.find(s => s.id === id);
  if (!story) return;
  document.getElementById('book-title').textContent = `${story.title}  ·  ${story.author || 'Unknown'}`;
  sentences = parseSentences(story.text);
  words = story.text.replace(/\n+/g, ' ').split(/\s+/).filter(Boolean);
  // Restore saved position
  cursor = story.savedCursor || 0;
  wordIdx = story.savedWordIdx || 0;
  chapters = parseChapters(story.text);
  document.getElementById('empty-state').style.display = 'none';
  const cw = document.getElementById('caption-wrap');
  cw.style.display = 'flex'; cw.style.flexDirection = 'column'; cw.style.alignItems = 'center';
  renderChapterDrawer();
  renderCaption();
  renderSidebar();
  updateTimeRemaining();
}

// ── ORP helper ────────────────────────────────────────────────────────
function getORPIndex(word) {
  const clean = word.replace(/[^a-zA-Z]/g, '');
  if (clean.length <= 1) return 0;
  if (clean.length <= 5) return 1;
  if (clean.length <= 9) return 2;
  return 3;
}

// ── Render caption ─────────────────────────────────────────────────────
function renderCaption() {
  if (wordMode) { renderWordMode(); return; }
  const prev = document.getElementById('line-prev');
  const curr = document.getElementById('line-current');
  const next = document.getElementById('line-next');
  document.getElementById('orp-wrap').style.display = 'none';
  document.getElementById('caption-box').style.display = 'flex';
  prev.textContent = cursor > 0 ? sentences[cursor - 1] : '';
  curr.innerHTML = '';
  curr.classList.remove('caption-fresh'); void curr.offsetWidth; curr.classList.add('caption-fresh');
  const sentence = sentences[cursor] || '';
  sentence.split(' ').forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'word'; span.textContent = (i === 0 ? '' : ' ') + w;
    curr.appendChild(span);
  });
  next.textContent = cursor < sentences.length - 1 ? sentences[cursor + 1] : '';
  const pct = sentences.length > 1 ? (cursor / (sentences.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-scrub-handle').style.left = pct + '%';
  document.getElementById('counter').textContent = `${cursor + 1} / ${sentences.length}`;
  updateChapterLabel();
  updateTimeRemaining();
}

function renderWordMode() {
  const w = words[wordIdx] || '';
  // ORP alignment
  document.getElementById('caption-box').style.display = 'none';
  const orpWrap = document.getElementById('orp-wrap');
  orpWrap.style.display = 'flex';
  orpWrap.classList.remove('caption-fresh'); void orpWrap.offsetWidth; orpWrap.classList.add('caption-fresh');
  const orpIdx = getORPIndex(w);
  document.getElementById('orp-before').textContent = w.slice(0, orpIdx);
  document.getElementById('orp-letter').textContent = w[orpIdx] || '';
  document.getElementById('orp-after').textContent = w.slice(orpIdx + 1);
  // Context lines
  const ctx = 5;
  document.getElementById('line-prev').textContent = words.slice(Math.max(0, wordIdx - ctx), wordIdx).join(' ');
  document.getElementById('line-current').innerHTML = '';
  document.getElementById('line-next').textContent = words.slice(wordIdx + 1, wordIdx + 1 + ctx).join(' ');
  const pct = words.length > 1 ? (wordIdx / (words.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-scrub-handle').style.left = pct + '%';
  document.getElementById('counter').textContent = `${wordIdx + 1} / ${words.length}`;
  document.getElementById('chapter-label').textContent = 'Word · RSVP';
  updateTimeRemaining();
}

// ── Playback ────────────────────────────────────────────────────────────
function togglePlay() { playing ? stopPlay() : startPlay(); }
function startPlay() {
  playing = true; updatePlayBtn();
  if (wordMode) runWordPlay(); else runSentPlay();
}
function stopPlay() { playing = false; clearTimeout(playTimer); clearTimeout(wordTimer); updatePlayBtn(); savePos(); }

function runSentPlay() {
  if (!playing) return;
  if (cursor >= sentences.length - 1) { stopPlay(); return; }
  cursor++; renderCaption();
  playTimer = setTimeout(runSentPlay, getDelay());
}
function runWordPlay() {
  if (!playing) return;
  if (wordIdx >= words.length - 1) { stopPlay(); return; }
  wordIdx++; renderWordMode();
  const delay = getWordDelay() * getPunctMultiplier(words[wordIdx]);
  wordTimer = setTimeout(runWordPlay, delay);
}
function updatePlayBtn() {
  const icon = document.getElementById('play-icon');
  icon.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="6,4 20,12 6,20"/>';
}

function stepForward() {
  stopPlay();
  if (wordMode) { if (wordIdx < words.length - 1) { wordIdx++; renderWordMode(); } }
  else { if (cursor < sentences.length - 1) { cursor++; renderCaption(); } }
  savePos();
}
function stepBack() {
  stopPlay();
  if (wordMode) { if (wordIdx > 0) { wordIdx--; renderWordMode(); } }
  else { if (cursor > 0) { cursor--; renderCaption(); } }
  savePos();
}
function restartReader() {
  stopPlay(); cursor = 0; wordIdx = 0;
  if (currentStoryId) { renderCaption(); savePos(); }
}

// ── Mode ─────────────────────────────────────────────────────────────
function toggleMode() {
  stopPlay(); wordMode = !wordMode;
  const btn = document.getElementById('mode-btn');
  btn.textContent = wordMode ? 'Sent.' : 'Word';
  btn.classList.toggle('active-btn', wordMode);
  if (currentStoryId) renderCaption();
}

// ── Progress scrubbing ─────────────────────────────────────────────────
document.getElementById('progress-bar').addEventListener('click', function(e) {
  if (!currentStoryId) return;
  const rect = this.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  stopPlay();
  if (wordMode) {
    wordIdx = Math.round(pct * (words.length - 1));
    renderWordMode();
  } else {
    cursor = Math.round(pct * (sentences.length - 1));
    renderCaption();
  }
  savePos();
});
// Touch scrubbing
document.getElementById('progress-bar').addEventListener('touchstart', function(e) {
  if (!currentStoryId) return;
  e.preventDefault();
  const rect = this.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
  stopPlay();
  if (wordMode) { wordIdx = Math.round(pct * (words.length - 1)); renderWordMode(); }
  else { cursor = Math.round(pct * (sentences.length - 1)); renderCaption(); }
  savePos();
}, { passive: false });

// ── Modal ───────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-author').value = '';
  document.getElementById('inp-text').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-title').focus(), 150);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) { document.getElementById('inp-text').value = text; showToast('Pasted ✦'); }
  } catch { showToast('Paste not supported — use Ctrl+V'); }
}

function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault(); onDragLeave();
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
}
function onFileSelect(e) { const file = e.target.files[0]; if (file) readFile(file); }
function readFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    let text = evt.target.result;
    if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
      const div = document.createElement('div');
      div.innerHTML = text;
      text = div.innerText;
    }
    document.getElementById('inp-text').value = text.trim();
    if (!document.getElementById('inp-title').value) {
      document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '');
    }
    showToast('File loaded ✦');
  };
  reader.readAsText(file);
}

function saveStory() {
  const title = document.getElementById('inp-title').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const text = document.getElementById('inp-text').value.trim();
  if (!title || !text) { showToast('Please enter a title and story text.'); return; }
  const story = { id: 's' + Date.now(), title, author, text };
  stories.push(story); save(); closeModal(); renderSidebar(); loadStory(story.id);
  showToast('Story saved ✦');
}
function deleteStory(id, e) {
  e.stopPropagation();
  if (!confirm('Remove this story?')) return;
  stories = stories.filter(s => s.id !== id); save();
  if (currentStoryId === id) {
    currentStoryId = null; stopPlay();
    document.getElementById('empty-state').style.display = '';
    document.getElementById('caption-wrap').style.display = 'none';
    document.getElementById('book-title').textContent = '—';
    document.getElementById('wpm-val').textContent = '— wpm';
    document.getElementById('time-remaining').textContent = '—';
  }
  renderSidebar(); showToast('Story removed');
}

// ── Toast ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Keyboard ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); if (currentStoryId) togglePlay(); }
  if (e.code === 'ArrowRight') stepForward();
  if (e.code === 'ArrowLeft') stepBack();
});

// ── Swipe ───────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) stepForward(); else stepBack();
  }
}, { passive: true });

// ── Service Worker ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

// ── Init ──────────────────────────────────────────────────────────────
renderSidebar();
if (stories.length > 0) loadStory(stories[0].id);
</script>
</body>
</html>
